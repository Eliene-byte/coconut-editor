name: Build Coconut Editor

on: [push, pull_request]

jobs:
  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg baseline
        shell: pwsh
        run: |
          cd C:\vcpkg
          git fetch --depth 1 origin 2023.11.14
          git checkout 2023.11.14
          .\bootstrap-vcpkg.bat
          "VCPKG_ROOT=C:\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install dependencies
        shell: pwsh
        run: vcpkg install --triplet x64-windows
        working-directory: ${{ github.workspace }}

      - name: Configure CMake
        shell: pwsh
        run: cmake -B build -S . -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake"

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release
