name: Build CoConut Editor REAL

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Qt 6.7.2 with Multimedia
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.7.2'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        modules: 'qtmultimedia qt5compat'
        cache: true
        
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
        
    - name: Configure CMake
      run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$env:Qt6_DIR"
      
    - name: Build
      run: cmake --build build --config Release --parallel
      
    - name: Deploy Qt
      shell: pwsh
      run: |
        cd build/Release
        $qtbin = "$env:Qt6_DIR\bin"
        & "$qtbin\windeployqt.exe" --release --multimedia --multimediawidgets --no-translations --no-opengl-sw CoConutEditor.exe
        
        # Copia plugins de midia manualmente (fix comum)
        Copy-Item "$qtbin\..\plugins\multimedia" -Destination ".\plugins\" -Recurse -Force -ErrorAction SilentlyContinue
        Copy-Item "$qtbin\..\plugins\mediaservice" -Destination ".\plugins\" -Recurse -Force -ErrorAction SilentlyContinue
        
    - name: Verify DLLs
      shell: pwsh
      run: |
        cd build/Release
        dir *.dll
        if (!(Test-Path "Qt6Multimedia.dll")) { throw "Faltou Qt6Multimedia.dll" }
        if (!(Test-Path "Qt6MultimediaWidgets.dll")) { throw "Faltou Qt6MultimediaWidgets.dll" }
        
    - name: Package
      run: |
        cd build
        7z a -tzip CoConutEditor-v0.1-WIN64.zip Release\*
        
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: CoConutEditor-v0.1-WIN64
        path: build/CoConutEditor-v0.1-WIN64.zip
        retention-days: 30
