name: Build CoConut Editor

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.7.2'
    - name: Configure CMake
      run: cmake -B build -S .
    - name: Build
      run: cmake --build build --config Release
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: CoConutEditor-Windows
        path: |
          build/Release/CoConutEditor.exe
          build/Release/*.dll
